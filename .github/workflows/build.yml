name: Build XMRig

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libssl-dev libhwloc-dev

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. \
            -DOPENSSL_USE_STATIC_LIBS=TRUE \
            -DOPENSSL_CRYPTO_LIBRARY=/usr/lib/x86_64-linux-gnu/libcrypto.a \
            -DOPENSSL_SSL_LIBRARY=/usr/lib/x86_64-linux-gnu/libssl.a \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DDONATE_LEVEL=0
          make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-linux-static
          path: build/xmrig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-hwloc

      - name: Build
        shell: msys2 {0}
        run: |
          mkdir build && cd build
          cmake .. -G "Unix Makefiles" \
            -DDONATE_LEVEL=0
          make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-windows
          path: build/xmrig.exe
