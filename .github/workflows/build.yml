name: Build XMRig

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            automake libtool autoconf

      - name: Build static deps
        run: |
          cd scripts
          ./build_deps.sh

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DXMRIG_DEPS=scripts/deps -DDONATE_LEVEL=0
          make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-linux-static
          path: build/xmrig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout xmrig-deps
        run: git clone https://github.com/xmrig/xmrig-deps.git c:/xmrig-deps

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            make

      - name: Build
        shell: msys2 {0}
        run: |
          mkdir build && cd build
          cmake .. -G "Unix Makefiles" \
            -DXMRIG_DEPS=c:/xmrig-deps/gcc/x64 \
            -DDONATE_LEVEL=0
          make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xmrig-windows
          path: build/xmrig.exe
